[main]
font=0xProto Nerd Font:weight=regular:size=16
shell=fish
title=foot
letter-spacing=0
dpi-aware=no
pad=45x35
bold-text-in-bright=no
gamma-correct-blending=no

[scrollback]
lines=10000

[cursor]
style=beam
blink=yes
beam-thickness=2

# [colors]
